name: RestSharp.Core Build and Test

on:
  push:
    branches: [ master, main, 'devin/**' ]
    paths:
      - 'RestSharp.Core/**'
      - 'RestSharp.Core.Tests/**'
      - 'RestSharp.Core.sln'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'RestSharp.Core/**'
      - 'RestSharp.Core.Tests/**'
      - 'RestSharp.Core.sln'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Debug, Release]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Display .NET version
      run: dotnet --version

    - name: Restore dependencies
      run: dotnet restore RestSharp.Core.sln

    - name: Build solution
      run: dotnet build RestSharp.Core.sln --configuration ${{ matrix.configuration }} --no-restore

    - name: Run tests
      run: dotnet test RestSharp.Core.sln --configuration ${{ matrix.configuration }} --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Upload coverage reports
      if: matrix.os == 'ubuntu-latest' && matrix.configuration == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ./coverage
        retention-days: 30

  pack:
    name: Create NuGet Package
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore RestSharp.Core.sln

    - name: Build Release
      run: dotnet build RestSharp.Core.sln --configuration Release --no-restore

    - name: Create NuGet package
      run: dotnet pack RestSharp.Core/RestSharp.Core.csproj --configuration Release --no-build --output ./nupkg

    - name: Upload NuGet package
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ./nupkg/*.nupkg
        retention-days: 30

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore RestSharp.Core.sln

    - name: Build with analyzers
      run: dotnet build RestSharp.Core.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=false

    - name: Check for formatting issues
      run: dotnet format RestSharp.Core.sln --verify-no-changes --verbosity diagnostic || echo "Formatting check completed (warnings only)"
